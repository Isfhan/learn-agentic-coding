<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Reader — The Agentic Coding Roadmap</title>
<meta name="description" content="In-site Markdown reader for the Agentic Coding Roadmap." />
<meta name="theme-color" content="#0a0707" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"General Sans"', 'Inter', 'ui-sans-serif', 'system-ui'],
          display: ['"General Sans"', 'Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: {
            950: '#0a0707',
            900: '#120a0b',
            800: '#1a0e10',
            700: '#231318',
            600: '#2e181f',
          },
          accent: {
            indigo:  '#fecdd3', // rose-200
            sky:     '#fb7185', // rose-400
            fuchsia: '#f43f5e', // rose-500
            amber:   '#e11d48', // rose-600 (primary)
            emerald: '#fda4af', // rose-300
          }
        },
      }
    }
  }
</script>

<style>
  :root {
    --grad-1: linear-gradient(135deg, #fb7185 0%, #e11d48 55%, #9f1239 100%);
    --grad-2: linear-gradient(135deg, #fecdd3 0%, #e11d48 55%, #881337 100%);
    --grad-3: linear-gradient(135deg, #f43f5e 0%, #9f1239 100%);
  }

  html { scroll-behavior: smooth; }
  body {
    background: #0a0707;
    color: #efe6e4;
    font-family: 'General Sans', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .font-display { letter-spacing: -0.02em; font-weight: 600; }

  .text-grad {
    background: var(--grad-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .glass {
    background: linear-gradient(180deg, rgba(239,230,228,0.04), rgba(239,230,228,0.012));
    border: 1px solid rgba(239,230,228,0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .glass-hover { transition: transform .3s cubic-bezier(.2,.7,.2,1), border-color .3s, background .3s; }
  .glass-hover:hover {
    transform: translateY(-1px);
    border-color: rgba(244,63,94,0.38);
  }

  /* Prose overrides for rose/red + General Sans */
  .prose-roadmap {
    color: #ddc8ca;
    font-size: 1.0625rem;
    line-height: 1.75;
  }
  .prose-roadmap h1, .prose-roadmap h2, .prose-roadmap h3, .prose-roadmap h4 {
    font-family: 'General Sans', 'Inter', sans-serif;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: #f7eded;
  }
  .prose-roadmap h1 { font-size: 2.6rem; line-height: 1.1; margin: 0 0 1.2rem; }
  .prose-roadmap h2 {
    font-size: 1.8rem;
    margin: 2.4rem 0 1rem;
    padding-bottom: .45rem;
    border-bottom: 1px solid rgba(239,230,228,0.08);
  }
  .prose-roadmap h3 { font-size: 1.35rem; margin: 1.8rem 0 .6rem; }
  .prose-roadmap h4 { font-size: 1.1rem; margin: 1.4rem 0 .5rem; color:#efe6e4; }
  .prose-roadmap p { margin: 0 0 1rem; }
  .prose-roadmap a {
    color: #f43f5e;
    text-decoration: none;
    border-bottom: 1px dashed rgba(244,63,94,0.45);
    transition: color .2s, border-color .2s;
  }
  .prose-roadmap a:hover { color: #fb7185; border-bottom-color: rgba(251,113,133,0.55); }
  .prose-roadmap strong { color: #f7e8e8; font-weight: 650; }
  .prose-roadmap em { color: #efe6e4; font-style: italic; }
  .prose-roadmap blockquote {
    border-left: 3px solid #e11d48;
    background: linear-gradient(180deg, rgba(225,29,72,0.08), rgba(225,29,72,0.02));
    padding: .6rem 1rem;
    border-radius: 0 .5rem .5rem 0;
    color: #e0cbcc;
    margin: 1.2rem 0;
  }
  .prose-roadmap ul, .prose-roadmap ol { padding-left: 1.35rem; margin: 0 0 1.1rem; }
  .prose-roadmap li { margin: .3rem 0; }
  .prose-roadmap ul li::marker { color: #f43f5e; }
  .prose-roadmap ol li::marker { color: #e11d48; font-weight: 600; }
  .prose-roadmap hr { border: none; border-top: 1px solid rgba(239,230,228,0.08); margin: 2rem 0; }
  .prose-roadmap code {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .88em;
    background: rgba(244,63,94,0.1);
    color: #fecdd3;
    padding: .1rem .4rem;
    border-radius: .3rem;
    border: 1px solid rgba(244,63,94,0.18);
  }
  .prose-roadmap pre {
    background: #0f0a0b;
    border: 1px solid rgba(239,230,228,0.08);
    border-radius: .7rem;
    padding: 1rem 1.1rem;
    overflow-x: auto;
    margin: 1.1rem 0;
    font-size: .9rem;
    line-height: 1.6;
  }
  .prose-roadmap pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: #efe6e4;
    font-size: inherit;
  }
  .prose-roadmap table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.2rem 0;
    font-size: .95rem;
  }
  .prose-roadmap th, .prose-roadmap td {
    border: 1px solid rgba(239,230,228,0.08);
    padding: .55rem .8rem;
    text-align: left;
  }
  .prose-roadmap th { background: rgba(239,230,228,0.03); color: #f7eded; font-weight: 600; }
  .prose-roadmap img { max-width: 100%; border-radius: .6rem; margin: 1rem 0; }
  .prose-roadmap input[type="checkbox"] { accent-color: #e11d48; margin-right: .4rem; }

  /* Plain text fallback */
  .plain-text {
    background: #0f0a0b;
    border: 1px solid rgba(239,230,228,0.08);
    border-radius: .7rem;
    padding: 1.2rem 1.3rem;
    overflow-x: auto;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .92rem;
    line-height: 1.7;
    color: #ddc8ca;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0a0707; }
  ::-webkit-scrollbar-thumb { background: #3a2a2c; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #5a3038; }

  ::selection { background: #e11d48; color: #0a0707; }

  .spinner {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid rgba(239,230,228,0.12);
    border-top-color: #e11d48;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="sticky top-0 z-40 backdrop-blur-xl" style="background: rgba(10,7,7,0.78); border-bottom: 1px solid rgba(239,230,228,0.07);">
  <div class="max-w-4xl mx-auto px-6 py-3.5 flex items-center justify-between gap-4">
    <a href="index.html" class="inline-flex items-center gap-2.5 font-display tracking-tight text-[17px]">
      <span class="inline-flex h-7 w-7 items-center justify-center rounded-lg" style="background: linear-gradient(180deg, #e11d48 0%, #9f1239 100%)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </span>
      <span>Back to <span class="text-grad italic">roadmap</span></span>
    </a>
    <div class="flex items-center gap-2">
      <a id="raw-link" target="_blank" rel="noopener" class="hidden sm:inline-flex items-center gap-1.5 text-xs font-medium text-white/60 hover:text-white transition px-3 py-1.5 rounded-lg glass glass-hover">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>Raw file</span>
      </a>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-6 py-10 md:py-14">
  <div id="status" class="flex items-center gap-3 text-white/60 text-sm">
    <div class="spinner"></div>
    <span>Loading…</span>
  </div>

  <div id="error" class="hidden glass rounded-2xl p-6 md:p-7" style="border-color: rgba(225,29,72,0.4)">
    <div class="flex items-start gap-3">
      <div class="h-8 w-8 rounded-lg flex items-center justify-center shrink-0" style="background: linear-gradient(135deg, #f43f5e, #881337)">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
      </div>
      <div>
        <h2 class="font-display text-lg font-semibold">Could not load this file</h2>
        <p id="error-msg" class="mt-2 text-sm text-white/65"></p>
        <p class="mt-3 text-sm text-white/55">
          Tip: serve the repository from its <strong class="text-white/75">root</strong> (not the <code>site/</code> folder), for example:
        </p>
        <pre class="mt-2 plain-text text-xs">python -m http.server 8080
# then open http://localhost:8080/site/</pre>
      </div>
    </div>
  </div>

  <article id="content" class="hidden prose-roadmap"></article>
  <pre id="plain" class="hidden plain-text"></pre>

  <div class="mt-14 pt-8 border-t border-white/5 flex flex-wrap items-center justify-between gap-4 text-sm">
    <a href="index.html" class="inline-flex items-center gap-2 text-white/60 hover:text-white transition">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to roadmap
    </a>
    <a href="#top" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;" class="text-white/40 hover:text-white/70 transition">Back to top ↑</a>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const rawPath = params.get('path') || '';
  const title = params.get('title');

  const statusEl  = document.getElementById('status');
  const errorEl   = document.getElementById('error');
  const errorMsg  = document.getElementById('error-msg');
  const contentEl = document.getElementById('content');
  const plainEl   = document.getElementById('plain');
  const rawLink   = document.getElementById('raw-link');

  function showError(msg) {
    statusEl.classList.add('hidden');
    errorMsg.textContent = msg;
    errorEl.classList.remove('hidden');
  }

  if (!rawPath) {
    showError('No file path provided. Expected ?path=../steps/00-introduction.md');
  } else {
    // Resolve against the current page so ../ goes up from /site/read.html to repo root.
    let resolvedUrl;
    try {
      resolvedUrl = new URL(rawPath, window.location.href);
    } catch (e) {
      showError('Invalid path: ' + rawPath);
    }

    if (resolvedUrl) {
      rawLink.href = resolvedUrl.href;

      // Heuristic: treat .md as markdown; everything else as plain text.
      const isMarkdown = /\.md(\?|#|$)/i.test(rawPath);
      const derivedTitle = title || rawPath.split('/').pop().replace(/\.md$/i, '');
      document.title = derivedTitle + ' — Agentic Roadmap';

      fetch(resolvedUrl.href, { cache: 'no-cache' })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
          return r.text();
        })
        .then(text => {
          statusEl.classList.add('hidden');
          if (isMarkdown) {
            marked.setOptions({ gfm: true, breaks: false });
            const html = marked.parse(text);
            contentEl.innerHTML = DOMPurify.sanitize(html);
            // Rewrite relative .md links so clicks stay in the reader.
            contentEl.querySelectorAll('a[href]').forEach(a => {
              const href = a.getAttribute('href');
              if (!href) return;
              if (/^(https?:)?\/\//i.test(href)) { a.target = '_blank'; a.rel = 'noopener'; return; }
              if (href.startsWith('#')) return;
              try {
                const target = new URL(href, resolvedUrl);
                const sameOrigin = target.origin === location.origin;
                if (sameOrigin && /\.md(\?|#|$)/i.test(target.pathname)) {
                  const newPath = relativePath(window.location.pathname, target.pathname) + target.search + target.hash;
                  a.href = 'read.html?path=' + encodeURIComponent(newPath);
                }
              } catch (_) {}
            });
            contentEl.classList.remove('hidden');
          } else {
            plainEl.textContent = text;
            plainEl.classList.remove('hidden');
          }
        })
        .catch(err => {
          showError(err.message + '. The file was requested at: ' + resolvedUrl.href);
        });
    }
  }

  // Returns a path relative to the directory of `fromPath` that points at `toPath`.
  function relativePath(fromPath, toPath) {
    const fromDir = fromPath.replace(/[^/]*$/, '').split('/').filter(Boolean);
    const toParts = toPath.split('/').filter(Boolean);
    let i = 0;
    while (i < fromDir.length && i < toParts.length && fromDir[i] === toParts[i]) i++;
    const ups = new Array(fromDir.length - i).fill('..');
    return ups.concat(toParts.slice(i)).join('/') || '.';
  }
</script>

</body>
</html>
